[workspace]
resolver = "3"
members = [
    "adsmt-core",
    "adsmt-cert",
    "adsmt-theory",
    "adsmt-class",
    "adsmt-quant",
    "adsmt-abduce",
    "adsmt-engine",
    "adsmt-parser",
    "adsmt-heuristic-checker",
    "adsmt-heuristic-checker-macros",
    "adsmt-lints",
    "adsmt-cli",
    "adsmt-ffi",
]
exclude = ["external/logicutils", "external/oxiz"]

[workspace.package]
# Minor bump 0.23 → 0.25 opens the v0.25 cycle. logicutils stays
# at 0.25.0 — the v0.23 cycle's logicutils bump was already
# annotated as the *last* separately-versioned release before
# v1.0 absorption (21E.2 option 2-A'). The +2 offset rule
# effectively retires this cycle; logicutils may receive patch
# bumps only.
#
# v0.25 = **phase 2 of the v1.0 RC roadmap** (lsp_roadmap.md).
# Headline theme: **LSP implementation + vscode-extension
# split**. Mandatory completion target per user instruction
# (21F.3 option 4).
#
# v0.25 scope:
#   * New `adsmt-lsp` crate (or `tooling/adsmt-lsp/`) hosting
#     a `tower-lsp`-based server. Six required capabilities:
#       — textDocument/publishDiagnostics
#       — textDocument/definition
#       — textDocument/hover
#       — textDocument/completion
#       — workspace/symbol
#       — textDocument/codeAction
#   * vscode-extension split along the editor-agnostic vs
#     VSCode-specific axis (server logic → agnostic; VSCode
#     command palette / settings UI → vscode-specific).
#   * Carry-over: 23B.1 CDCL two-watched literals (substantial
#     inner-loop restructure deferred from v0.23 so LSP work
#     and the CDCL rewrite don't collide).
#   * Mid-cycle audit (25H.1) and phase 2 sign-off (25H.2 —
#     gates entry to phase 3 v1.0 RC).
version = "0.25.0"
edition = "2024"
license = "BSD-2-Clause OR Apache-2.0 OR LGPL-2.1-or-later"

[workspace.dependencies]
adsmt-core = { path = "adsmt-core" }
adsmt-cert = { path = "adsmt-cert" }
adsmt-theory = { path = "adsmt-theory" }
adsmt-class = { path = "adsmt-class" }
adsmt-quant = { path = "adsmt-quant" }
adsmt-abduce = { path = "adsmt-abduce" }
adsmt-engine = { path = "adsmt-engine" }
adsmt-parser = { path = "adsmt-parser" }

thiserror = "2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
clap = { version = "4.6", features = ["derive"] }
smallvec = "1.13"
indexmap = "2.6"

[profile.release]
lto = "thin"

# Path A+B Phase 3: route oxiz-sat / oxiz-proof / oxiz-math through
# our fork's `feat/enable-writer` branch until the upstream PR lands.
# The fork is a strict superset (see
# `.claude-memories/oxiz_relationship.md`).
[patch.crates-io]
oxiz-sat = { path = "external/oxiz/oxiz-sat" }
oxiz-proof = { path = "external/oxiz/oxiz-proof" }
oxiz-math = { path = "external/oxiz/oxiz-math" }

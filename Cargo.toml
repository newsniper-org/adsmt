[workspace]
resolver = "3"
members = [
    "adsmt-core",
    "adsmt-cert",
    "adsmt-theory",
    "adsmt-class",
    "adsmt-quant",
    "adsmt-abduce",
    "adsmt-engine",
    "adsmt-parser",
    "adsmt-heuristic-checker",
    "adsmt-heuristic-checker-macros",
    "adsmt-lints",
    "adsmt-cli",
    "adsmt-ffi",
]
exclude = ["external/logicutils", "external/oxiz"]

[workspace.package]
# Minor bump 0.19 → 0.21 opens the v0.21 cycle (odd-minor
# cycle naming per project convention). Per the restored +2
# offset rule, logicutils bumps 0.21.0 → 0.23.0 in lockstep.
#
# v0.21 scope (per project_cycle_versioning.md):
#   * **P5 v1.0 architectural decision** carried forward from
#     v0.19 — adsmt ⇔ OxiZ relationship (E.1), logicutils +
#     adsmt v1.0 unification plan (E.2), first
#     `#![breaking_changes_semver("1.0.0")]` attribute (E.4),
#     v1.0 transition notes in policy docs (H.2). All blocked
#     on user decision; v0.21 is the cycle where these land.
#   * v0.19 substantial carry-over:
#       — A.2 L-full LFSC parser + per-ITP consumer.
#       — A.3 full EUF-tracked incremental E-graph + per-trigger
#         learning loop (the `learn_triggers` helper landed in
#         v0.19 as the lightweight half).
#       — B.3 full 1-UIP CDCL clause learning + non-chronological
#         backjumping (the Luby restart half landed in v0.19).
#   * F.3 LSP exploration (carry-over, scope TBD with user).
#   * v0.21 cycle audit + status snapshot conventions
#     refresh.
version = "0.21.0"
edition = "2024"
license = "BSD-2-Clause OR Apache-2.0 OR LGPL-2.1-or-later"

[workspace.dependencies]
adsmt-core = { path = "adsmt-core" }
adsmt-cert = { path = "adsmt-cert" }
adsmt-theory = { path = "adsmt-theory" }
adsmt-class = { path = "adsmt-class" }
adsmt-quant = { path = "adsmt-quant" }
adsmt-abduce = { path = "adsmt-abduce" }
adsmt-engine = { path = "adsmt-engine" }
adsmt-parser = { path = "adsmt-parser" }

thiserror = "2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
clap = { version = "4.6", features = ["derive"] }
smallvec = "1.13"
indexmap = "2.6"

[profile.release]
lto = "thin"

# Path A+B Phase 3: route oxiz-sat / oxiz-proof / oxiz-math through
# our fork's `feat/enable-writer` branch until the upstream PR lands.
# The fork is a strict superset (see
# `.claude-memories/oxiz_relationship.md`).
[patch.crates-io]
oxiz-sat = { path = "external/oxiz/oxiz-sat" }
oxiz-proof = { path = "external/oxiz/oxiz-proof" }
oxiz-math = { path = "external/oxiz/oxiz-math" }

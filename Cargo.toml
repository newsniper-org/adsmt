[workspace]
resolver = "3"
members = [
    "adsmt-core",
    "adsmt-cert",
    "adsmt-theory",
    "adsmt-class",
    "adsmt-quant",
    "adsmt-abduce",
    "adsmt-engine",
    "adsmt-parser",
    "adsmt-heuristic-checker",
    "adsmt-heuristic-checker-macros",
    "adsmt-lints",
    "adsmt-cli",
    "adsmt-ffi",
]
exclude = ["external/logicutils", "external/oxiz"]

[workspace.package]
# Minor bump 0.18 → 0.19 opens the v0.19 cycle. Per the user
# policy adopted 2026-05-29, the v0.x-smt branch ⇔ adsmt
# synchronisation rule **returns to the original +2 offset**
# (logicutils minor = adsmt minor + 2), so logicutils bumps
# 0.18.0 → 0.21.0 in lockstep. The intervening logicutils
# minors (0.19, 0.20) are intentionally skipped — they belong
# to the post-restoration accounting.
#
# v0.19 scope (per project_cycle_versioning.md):
#   * v0.18 carry-over deepening (compound-rule reconstruction
#     full, LFSC full, EUF-tracked E-graph, scan=true real
#     two-pass wiring, proc-macro OUT_DIR auto-use).
#   * DPLL(T) engine maturation.
#   * Theory layer deepening (BV bit-blasting, LIA/LRA Simplex
#     refinements, Arrays combinators, Datatypes recursive).
#   * Quantifier + abductive tier 4 / typed unification.
#   * P5 — v1.0 architectural decision (adsmt ⇔ OxiZ
#     relationship + logicutils + adsmt v1.0 unification).
#   * Tooling (VS Code extension, adsmt-cli audit subcommand),
#     CI, benchmarks.
version = "0.19.0"
edition = "2024"
license = "BSD-2-Clause OR Apache-2.0 OR LGPL-2.1-or-later"

[workspace.dependencies]
adsmt-core = { path = "adsmt-core" }
adsmt-cert = { path = "adsmt-cert" }
adsmt-theory = { path = "adsmt-theory" }
adsmt-class = { path = "adsmt-class" }
adsmt-quant = { path = "adsmt-quant" }
adsmt-abduce = { path = "adsmt-abduce" }
adsmt-engine = { path = "adsmt-engine" }
adsmt-parser = { path = "adsmt-parser" }

thiserror = "2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
clap = { version = "4.6", features = ["derive"] }
smallvec = "1.13"
indexmap = "2.6"

[profile.release]
lto = "thin"

# Path A+B Phase 3: route oxiz-sat / oxiz-proof / oxiz-math through
# our fork's `feat/enable-writer` branch until the upstream PR lands.
# The fork is a strict superset (see
# `.claude-memories/oxiz_relationship.md`).
[patch.crates-io]
oxiz-sat = { path = "external/oxiz/oxiz-sat" }
oxiz-proof = { path = "external/oxiz/oxiz-proof" }
oxiz-math = { path = "external/oxiz/oxiz-math" }

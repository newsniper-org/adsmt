[workspace]
resolver = "3"
members = [
    "adsmt-core",
    "adsmt-cert",
    "adsmt-theory",
    "adsmt-class",
    "adsmt-quant",
    "adsmt-abduce",
    "adsmt-engine",
    "adsmt-parser",
    "adsmt-heuristic-checker",
    "adsmt-heuristic-checker-macros",
    "adsmt-lints",
    "adsmt-cli",
    "adsmt-ffi",
]
exclude = ["external/logicutils", "external/oxiz"]

[workspace.package]
# Minor bump 0.21 → 0.23 opens the v0.23 cycle. logicutils
# bumps 0.23.0 → 0.25.0 in lockstep (+2 offset preserved;
# 0.24 skipped, same convention as 0.19/0.20/0.22).
#
# v0.23 = **phase 1 of the v1.0 RC roadmap** (lsp_roadmap.md).
# Headline theme: **preemptive stabilisation** — every public
# surface that LSP (phase 2) and v1.0 RC (phase 3) will depend
# on gets frozen here, before any LSP-side code is touched.
#
# v0.23 scope:
#   * C ABI freeze candidate promotion (`adsmt-ffi/include/
#     adsmt.h` + `ABI_POLICY.md`).
#   * SMT-LIB dialect freeze — parser shapes, lu-kb keywords,
#     classical-axiom marker syntax. Surface drift forbidden
#     after sign-off.
#   * Certificate format freeze — S-expression cert + Lean
#     reflection + Rocq/Isabelle emit shapes locked.
#   * CDCL deepening — two-watched literals replacing the
#     per-clause `evaluate_clause` scan (queued from v0.21
#     B.1 follow-ups).
#   * EGraph integration — wire `EGraph::push/pop` into the
#     polite combination scope (21A.2 stage 4 wire-up
#     identified as v0.23 work).
#   * Theory deepening final pass — any v0.21 carry-over
#     plus the missing pieces flagged during the v1.0
#     transition note audit.
#   * Mid-cycle audit (`23H.1`) and post-freeze audit
#     (`23H.2`).
version = "0.23.0"
edition = "2024"
license = "BSD-2-Clause OR Apache-2.0 OR LGPL-2.1-or-later"

[workspace.dependencies]
adsmt-core = { path = "adsmt-core" }
adsmt-cert = { path = "adsmt-cert" }
adsmt-theory = { path = "adsmt-theory" }
adsmt-class = { path = "adsmt-class" }
adsmt-quant = { path = "adsmt-quant" }
adsmt-abduce = { path = "adsmt-abduce" }
adsmt-engine = { path = "adsmt-engine" }
adsmt-parser = { path = "adsmt-parser" }

thiserror = "2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
clap = { version = "4.6", features = ["derive"] }
smallvec = "1.13"
indexmap = "2.6"

[profile.release]
lto = "thin"

# Path A+B Phase 3: route oxiz-sat / oxiz-proof / oxiz-math through
# our fork's `feat/enable-writer` branch until the upstream PR lands.
# The fork is a strict superset (see
# `.claude-memories/oxiz_relationship.md`).
[patch.crates-io]
oxiz-sat = { path = "external/oxiz/oxiz-sat" }
oxiz-proof = { path = "external/oxiz/oxiz-proof" }
oxiz-math = { path = "external/oxiz/oxiz-math" }

name = "adsmt"
version = "0.5.0"
defaultTargets = ["Adsmt", "adsmt-smoke", "adsmt-smoke-tactic"]
keywords = ["smt", "abductive", "logic"]

# Resolve the Rust FFI library built by `cargo build --release -p adsmt-ffi`.
# `../target/release/` lives one directory above the `lean/` package root.
moreLinkArgs = [
  "-L", "../target/release",
  "-ladsmt_ffi",
  # Resolve libadsmt_ffi.so at runtime relative to the executable's
  # location: .lake/build/bin/adsmt-smoke → ../../../../target/release.
  "-Wl,-rpath,$ORIGIN/../../../../target/release",
]

[[lean_lib]]
name = "Adsmt"
# v0.5: precompile modules so `@[extern]` declarations from
# `Adsmt.Ffi` are reachable at elaboration time (e.g. from inside
# the `smt` tactic). The compiled `.o` files are loaded by the Lean
# interpreter; otherwise tactic-time FFI calls fail with a missing
# native implementation error.
precompileModules = true

[[lean_exe]]
name = "adsmt-smoke"
root = "Smoke"
supportInterpreter = true

[[lean_exe]]
name = "adsmt-smoke-tactic"
root = "SmokeTactic"
supportInterpreter = true
